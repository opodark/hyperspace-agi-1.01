version: '3.8'

# ============================================================
# HyperSpace AGI v0.2 — Compose PRODUZIONE
#
# Ollama NON è incluso: deve girare sull'host (nativo o LM Studio).
# Usa setup.sh per la configurazione guidata.
#
# Dashboard:   http://localhost:8085/dashboard
# Open WebUI:  http://localhost:3000
# Node API:    http://localhost:8084/status
# ============================================================

services:

  # ── Open WebUI ──────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hyperspace_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-hyperspace-secret-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Nodo agente locale ──────────────────────────────────
  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: hyperspace_node
    ports:
      - "8084:8084"
    volumes:
      - ./data/node:/app/data
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME:-node}
      NODE_PORT: "8084"
      DATA_DIR: /app/data
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      BOOT_PEERS: ${BOOT_PEERS:-}
      NODE_TIER: ${NODE_TIER:-leaf}
      VRAM_GB: ${VRAM_GB:-0.0}
      AUTHORITY_ENABLED: "false"
      # Endpoint pubblico di questo nodo (es. URL ngrok)
      # Se vuoto, usa NODE_HOSTNAME:NODE_PORT
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT:-}
      # URL del control-plane a cui questo nodo si auto-registra
      # Mac locale: http://control-plane:8085
      # Ubuntu remoto: https://charlesetta-haptical-unconcentratedly.ngrok-free.dev/cp
      #   oppure http://host.docker.internal:8085 se control-plane gira sull'host
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control-plane:8085}
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Control Plane + Dashboard ────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    depends_on: [node]
    ports:
      - "8085:8085"
    environment:
      NODE_ENDPOINTS: ${NODE_ENDPOINTS:-node:8084}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
      AUTHORITY_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyperspace
    restart: unless-stopped

  # ── Ollama-in-Docker (legacy, opzionale) ────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyperspace_ollama
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hyperspace
    restart: unless-stopped

networks:
  hyperspace:
    driver: bridge

volumes:
  open_webui_data:
  ollama_data:
