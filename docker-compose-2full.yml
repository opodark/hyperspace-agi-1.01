# docker-compose-2full.yml — full stack con postgres, nats, 3 worker
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hyperspace_postgres
    environment:
      POSTGRES_USER: hyperspace_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: hyperspace_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    restart: always

  nats:
    image: nats:latest
    container_name: hyperspace_nats
    ports:
      - "4222:4222"
    volumes:
      - ./nats/data:/data
    restart: always

  authority:
    build:
      context: .
      dockerfile: authority/Dockerfile
    container_name: hyperspace_authority
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      NATS_URL: nats://nats:4222
    depends_on:
      - postgres
      - nats
    restart: always

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    container_name: hyperspace_control_plane
    ports:
      - "8085:8085"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      NATS_URL: nats://nats:4222
    depends_on:
      - authority
      - nats
    restart: always

  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_1
    ports:
      - "8084:8084"
    environment:
      NODE_ENV: development
      NATS_URL: nats://nats:4222
      WORKER_ID: worker-1
      CAPACITY_CPU: 4
      CAPACITY_MEM_GB: 8
    depends_on:
      - authority
      - nats
    restart: always

  worker-2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_2
    ports:
      - "8086:8084"
    environment:
      NODE_ENV: development
      NATS_URL: nats://nats:4222
      WORKER_ID: worker-2
      CAPACITY_CPU: 6
      CAPACITY_MEM_GB: 16
    depends_on:
      - authority
      - nats
    restart: always

  worker-3:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: hyperspace_worker_3
    ports:
      - "8087:8084"
    environment:
      NODE_ENV: development
      NATS_URL: nats://nats:4222
      WORKER_ID: worker-3
      CAPACITY_CPU: 2
      CAPACITY_MEM_GB: 4
    depends_on:
      - authority
      - nats
    restart: always
